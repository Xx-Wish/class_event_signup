<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ event_name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main class="page">
        <section class="hero card">
            <p class="tag">Flask 动态网页 · GitHub 小组协作</p>
            <h1>{{ event_name }}</h1>
            <p class="description">{{ event_description }}</p>
            <p class="notice">{{ event_notice }}</p>
        </section>

        <section class="grid">
            <section class="card">
                <h2>填写报名信息</h2>
                <p class="muted">{{ welcome_text }}</p>
                <p class="tip">{{ form_tips }}</p>
                <form action="{{ url_for('signup') }}" method="post" class="signup-form">
                    <label>
                        姓名
                        <input name="name" placeholder="例如：张三" required>
                    </label>
                    <label>
                        小组
                        <select name="group_select" id="groupSelect" onchange="toggleCustomGroup()">
                            {% for group in group_options %}
                            <option value="{{ group }}">{{ group }}</option>
                            {% endfor %}
                            <option value="custom">自定义小组...</option>
                        </select>
                        <input type="text" name="group_custom" id="groupCustom" placeholder="输入新小组名称" style="display:none; margin-top:8px;">
                    </label>
                    <label>
                        活动方向
                        <select name="activity_select" id="activitySelect" onchange="toggleCustomActivity()">
                            {% for activity in activity_options %}
                            <option value="{{ activity }}">{{ activity }}</option>
                            {% endfor %}
                            <option value="custom">自定义活动...</option>
                        </select>
                        <input type="text" name="activity_custom" id="activityCustom" placeholder="输入新活动名称" style="display:none; margin-top:8px;">
                    </label>
                    <label>
                        一句话说明
                        <textarea name="reason" rows="4" placeholder="写一句你为什么想参加"></textarea>
                    </label>
                    <button type="submit">提交报名并查看统计</button>
                </form>

                <script>
                    function toggleCustomGroup() {
                        const select = document.getElementById('groupSelect');
                        const custom = document.getElementById('groupCustom');
                        if (select.value === 'custom') {
                            custom.style.display = 'block';
                            custom.required = true;
                        } else {
                            custom.style.display = 'none';
                            custom.required = false;
                        }
                    }

                    function toggleCustomActivity() {
                        const select = document.getElementById('activitySelect');
                        const custom = document.getElementById('activityCustom');
                        if (select.value === 'custom') {
                            custom.style.display = 'block';
                            custom.required = true;
                        } else {
                            custom.style.display = 'none';
                            custom.required = false;
                        }
                    }
                </script>
            </section>

            <section class="card side-card">
                <h2>当前状态</h2>
                <div class="big-number">{{ total }}</div>
                <p class="muted">已有报名记录</p>
                <a class="link-button" href="{{ url_for('result') }}">直接查看统计结果</a>
            </section>
        </section>
    </main>
</body>
</html>
